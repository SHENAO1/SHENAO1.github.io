name: Deploy site to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build publish directory
        run: |
          mkdir -p _site_publish
          cp index.html _site_publish/
          cp .nojekyll _site_publish/
          cp -R assets _site_publish/assets
          cp -R notes _site_publish/notes
          cp -R video-notes _site_publish/video-notes
          for dir in chapter-*; do
            if [ -d "$dir" ]; then
              cp -R "$dir" "_site_publish/$dir"
            fi
          done

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site_publish

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
